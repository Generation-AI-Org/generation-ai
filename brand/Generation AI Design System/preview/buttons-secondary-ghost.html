<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}</style></head><body><div class="card">
<div class="meta">// buttons · secondary · ghost · pill shape</div>
<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;">
  <button style="font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.02em;padding:12px 24px;border-radius:9999px;background:transparent;color:#F6F6F6;border:1px solid rgba(255,255,255,.15);cursor:pointer;">Mehr erfahren</button>
  <button style="font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.02em;padding:12px 24px;border-radius:9999px;background:rgba(255,255,255,.08);color:#8A8A8A;border:none;cursor:pointer;">Abbrechen</button>
  <button style="font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.02em;padding:10px;border-radius:9999px;background:rgba(255,255,255,.08);color:#F6F6F6;border:none;width:44px;height:44px;cursor:pointer;">→</button>
  <button style="font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.02em;padding:12px 24px;border-radius:9999px;background:rgba(220,38,38,.12);color:#F87171;border:none;cursor:pointer;">Löschen</button>
</div>
</div></body></html>
