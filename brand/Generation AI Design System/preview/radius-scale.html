<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}
.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
</style></head><body><div class="card">
<div class="meta">// radius · soft · defaults: buttons=full, cards=2xl</div>
<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;">
  
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);">sm</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">6px</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);">md</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">8px</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);">lg</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">10px</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);">xl</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">14px</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);">2xl</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">16px</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--bg-card);border:1px solid var(--border);border-radius:24px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);">3xl</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">24px</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
      <div style="width:72px;height:72px;background:var(--bg-card);border:1px solid var(--border);border-radius:9999px;"></div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);">full</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">pill</div>
    </div>
</div>
</div></body></html>
