<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}</style></head><body><div class="card">
<div class="meta">// toasts · status · voice-compliant</div>
<div style="display:flex;flex-direction:column;gap:10px;margin-top:10px;max-width:520px;">
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:16px;background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);color:#4ADE80;">
    <div style="width:8px;height:8px;border-radius:50%;background:#4ADE80;"></div>
    <span style="font-family:var(--font-sans);font-size:14px;font-weight:500;">Passt, gespeichert!</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:16px;background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#F87171;">
    <div style="width:8px;height:8px;border-radius:50%;background:#F87171;"></div>
    <span style="font-family:var(--font-sans);font-size:14px;font-weight:500;">Ups, da ist was schiefgelaufen. Probier's nochmal.</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:16px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#FBBF24;">
    <div style="width:8px;height:8px;border-radius:50%;background:#FBBF24;"></div>
    <span style="font-family:var(--font-sans);font-size:14px;font-weight:500;">Hmm, die Mail-Adresse passt noch nicht ganz.</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:16px;background:rgba(58,58,255,.1);border:1px solid rgba(58,58,255,.3);color:#9D9DFB;">
    <div style="width:8px;height:8px;border-radius:50%;background:#9D9DFB;"></div>
    <span style="font-family:var(--font-sans);font-size:14px;font-weight:500;">Einen Moment…</span>
  </div>
</div>
</div></body></html>
