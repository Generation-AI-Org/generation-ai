<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}</style></head><body><div class="card">
<div class="meta">// buttons · primary · rounded-full · geist mono · tracking +0.02</div>
<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;align-items:center;">
  <button style="font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.02em;padding:12px 24px;border-radius:9999px;background:#CEFF32;color:#141414;border:none;cursor:pointer;">Kostenlos beitreten</button>
  <button style="font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.02em;padding:12px 24px;border-radius:9999px;background:#CEFF32;color:#141414;border:none;cursor:pointer;box-shadow:0 0 20px rgba(206,255,50,0.5);">Hover glow</button>
  <button disabled style="font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.02em;padding:12px 24px;border-radius:9999px;background:#CEFF32;color:#141414;border:none;opacity:.5;cursor:not-allowed;">Disabled</button>
</div>
<div style="display:flex;gap:12px;margin-top:14px;">
  <button style="font-family:var(--font-mono);font-weight:700;font-size:12px;letter-spacing:.02em;padding:8px 16px;border-radius:9999px;background:#CEFF32;color:#141414;border:none;">Small</button>
  <button style="font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.02em;padding:10px 20px;border-radius:9999px;background:#CEFF32;color:#141414;border:none;">Default</button>
  <button style="font-family:var(--font-mono);font-weight:700;font-size:16px;letter-spacing:.02em;padding:16px 32px;border-radius:9999px;background:#CEFF32;color:#141414;border:none;">Large</button>
</div>
</div></body></html>
