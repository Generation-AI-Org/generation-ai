<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}
.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
</style></head><body><div class="card">
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">
  <div style="background:#141414;color:#CEFF32;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;">
    <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);">// primary · dark</div>
    <div style="font-family:var(--font-mono);font-weight:700;font-size:22px;margin-top:6px;">CEFF32</div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:10px;">
      <div style="width:14px;height:14px;background:#141414;border:1px solid rgba(255,255,255,.15);border-radius:4px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,.5);">on 141414</div>
    </div>
  </div>
  <div style="background:#F6F6F6;color:#F5133B;border:1px solid rgba(0,0,0,.1);border-radius:16px;padding:20px;">
    <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#777;">// primary · light</div>
    <div style="font-family:var(--font-mono);font-weight:700;font-size:22px;margin-top:6px;">F5133B</div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:10px;">
      <div style="width:14px;height:14px;background:#F6F6F6;border:1px solid rgba(0,0,0,.15);border-radius:4px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:#777;">on F6F6F6</div>
    </div>
  </div>
</div>
</div></body></html>
