<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}
.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
</style></head><body><div class="card">
<div class="meta">// geist mono · signature type · labels · tags · section markers</div>
<div style="display:flex;flex-direction:column;gap:14px;margin-top:6px;">
  <div style="display:flex;gap:14px;align-items:baseline;">
    <div style="font-family:var(--font-mono);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);">// section · 01</div>
    <div style="font-family:var(--font-mono);font-weight:700;font-size:14px;letter-spacing:.02em;">KOSTENLOS BEITRETEN</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <span style="font-family:var(--font-mono);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:9999px;background:rgba(206,255,50,.15);color:#CEFF32;">KI-Tools</span>
    <span style="font-family:var(--font-mono);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:9999px;background:var(--border);color:var(--text-muted);">Schreiben</span>
    <span style="font-family:var(--font-mono);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:9999px;background:var(--border);color:var(--text-muted);">Coding</span>
    <span style="font-family:var(--font-mono);font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:9999px;background:var(--border);color:var(--text-muted);">Recherche</span>
  </div>
  <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);">
    <span style="color:var(--text-muted);">$</span> login --email du@uni.de
  </div>
</div>
</div></body></html>
