<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}</style></head><body><div class="card">
<div class="meta">// card · tool library · content card</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:10px;">
  
    <div style="background:#1C1C1C;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:16px;">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:14px;">
        <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#2a2a2a,#1a1a1a);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;color:#CEFF32;">C</div>
        <span style="font-family:var(--font-mono);font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:9999px;background:rgba(255,255,255,.08);color:#8A8A8A;">Free</span>
      </div>
      <div style="font-family:var(--font-mono);font-weight:700;font-size:14px;color:#F6F6F6;margin-bottom:4px;">ChatGPT</div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(206,255,50,.5);margin-bottom:8px;">KI-Assistenten</div>
      <div style="font-family:var(--font-sans);font-size:13px;color:#B0B0B0;line-height:1.5;">Allround-Chatbot für Texte, Code und Recherche.</div>
    </div>
    <div style="background:#1C1C1C;border:2px solid #CEFF32;border-radius:16px;padding:16px;box-shadow:0 0 24px rgba(206,255,50,.3);">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:14px;">
        <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#2a2a2a,#1a1a1a);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;color:#CEFF32;">C</div>
        <span style="font-family:var(--font-mono);font-weight:700;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:9999px;background:rgba(255,255,255,.08);color:#8A8A8A;">Pro</span>
      </div>
      <div style="font-family:var(--font-mono);font-weight:700;font-size:14px;color:#F6F6F6;margin-bottom:4px;">Claude</div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(206,255,50,.5);margin-bottom:8px;">KI-Assistenten</div>
      <div style="font-family:var(--font-sans);font-size:13px;color:#B0B0B0;line-height:1.5;">Longform-Schreiben, Coding, nuancierte Analysen.</div>
    </div>
</div>
</div></body></html>
