<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}
.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
</style></head><body><div class="card">
<div class="meta">// semantic · status only · never brand accents</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:8px;">
  
    <div style="border:1px solid var(--border);border-radius:12px;padding:14px;">
      <div style="height:44px;background:#DC2626;border-radius:8px;margin-bottom:10px;"></div>
      <div style="font-family:var(--font-mono);font-weight:700;font-size:12px;">Error</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:2px;">#DC2626</div>
    </div>
    <div style="border:1px solid var(--border);border-radius:12px;padding:14px;">
      <div style="height:44px;background:#16A34A;border-radius:8px;margin-bottom:10px;"></div>
      <div style="font-family:var(--font-mono);font-weight:700;font-size:12px;">Success</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:2px;">#16A34A</div>
    </div>
    <div style="border:1px solid var(--border);border-radius:12px;padding:14px;">
      <div style="height:44px;background:#F59E0B;border-radius:8px;margin-bottom:10px;"></div>
      <div style="font-family:var(--font-mono);font-weight:700;font-size:12px;">Warning</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:2px;">#F59E0B</div>
    </div>
    <div style="border:1px solid var(--border);border-radius:12px;padding:14px;">
      <div style="height:44px;background:#2563EB;border-radius:8px;margin-bottom:10px;"></div>
      <div style="font-family:var(--font-mono);font-weight:700;font-size:12px;">Info</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:2px;">#2563EB</div>
    </div>
</div>
</div></body></html>
