<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px;}.sub{font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-muted);margin:24px 0 10px;}.tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;color:var(--text-muted);margin-top:10px;text-transform:uppercase;}.tile{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}.chk{background-image:linear-gradient(45deg,#2a2a2a 25%,transparent 25%),linear-gradient(-45deg,#2a2a2a 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#2a2a2a 75%),linear-gradient(-45deg,transparent 75%,#2a2a2a 75%);background-size:8px 8px;background-position:0 0,0 4px,4px -4px,-4px 0;background-color:#1a1a1a;}</style></head><body><div class="card">

<div class="meta">// favicon · dark mode — neon AI · transparent</div>
<div class="tile">
  <div class="chk" style="padding:12px;border-radius:12px;"><img src="../assets/logos/favicon-dark.svg?v=11" style="width:64px;height:64px;display:block;"></div>
  <div class="chk" style="padding:8px;border-radius:8px;"><img src="../assets/logos/favicon-dark.svg?v=11" style="width:32px;height:32px;display:block;"></div>
  <div class="chk" style="padding:4px;border-radius:4px;"><img src="../assets/logos/favicon-dark.svg?v=11" style="width:16px;height:16px;display:block;"></div>
  <div class="tag">64 · 32 · 16 px · transparent</div>
</div>

<div class="sub">// favicon · light mode — rot AI · transparent</div>
<div class="tile">
  <div style="background:#F6F6F6;padding:12px;border-radius:12px;"><img src="../assets/logos/favicon-light.svg?v=11" style="width:64px;height:64px;display:block;"></div>
  <div style="background:#F6F6F6;padding:8px;border-radius:8px;"><img src="../assets/logos/favicon-light.svg?v=11" style="width:32px;height:32px;display:block;"></div>
  <div style="background:#F6F6F6;padding:4px;border-radius:4px;"><img src="../assets/logos/favicon-light.svg?v=11" style="width:16px;height:16px;display:block;"></div>
  <div class="tag">64 · 32 · 16 px · transparent</div>
</div>

<div class="sub">// browser-tab · so sieht's in der tab-leiste aus</div>
<div style="display:flex;gap:10px;align-items:center;margin-top:6px;flex-wrap:wrap;">
  <div style="background:#fff;border:1px solid #d4d4d4;border-radius:8px 8px 0 0;padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#222;font-family:system-ui;">
    <img src="../assets/logos/favicon-light.svg?v=11" style="width:16px;height:16px;">
    generation-ai.org
  </div>
  <div style="background:#1f1f1f;border:1px solid #333;border-radius:8px 8px 0 0;padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#e0e0e0;font-family:system-ui;">
    <img src="../assets/logos/favicon-dark.svg?v=11" style="width:16px;height:16px;">
    generation-ai.org
  </div>
  <div style="background:#2b2b2b;border:1px solid #444;border-radius:8px 8px 0 0;padding:8px 12px;display:flex;align-items:center;gap:8px;font-size:12px;color:#e0e0e0;font-family:system-ui;">
    <img src="../assets/logos/favicon-dark.svg?v=11" style="width:16px;height:16px;">
    generation-ai.org
  </div>
</div>

</div></body></html>
