<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}
.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
</style></head><body><div class="card">
<div class="meta">// brand scales · 12 steps · radix pattern</div>
<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px;">
  <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:60px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);">neon</div>
      <div style="flex:1;display:grid;grid-template-columns:repeat(12,1fr);gap:2px;">

      </div>
    </div><div style="display:flex;align-items:center;gap:10px;">
      <div style="width:60px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);">blue</div>
      <div style="flex:1;display:grid;grid-template-columns:repeat(12,1fr);gap:2px;">
        <div title="blue-1" style="height:28px;background:#F9F9FD;border-radius:4px;"></div><div title="blue-2" style="height:28px;background:#EBEBFC;border-radius:4px;"></div><div title="blue-3" style="height:28px;background:#D5D5FB;border-radius:4px;"></div><div title="blue-4" style="height:28px;background:#BCBCFB;border-radius:4px;"></div><div title="blue-5" style="height:28px;background:#9D9DFB;border-radius:4px;"></div><div title="blue-6" style="height:28px;background:#7979FC;border-radius:4px;"></div><div title="blue-7" style="height:28px;background:#5454FC;border-radius:4px;"></div><div title="blue-8" style="height:28px;background:#3535FD;border-radius:4px;"></div><div title="blue-9" style="height:28px;background:#3A3AFF;border-radius:4px;"></div><div title="blue-10" style="height:28px;background:#2020F6;border-radius:4px;"></div><div title="blue-11" style="height:28px;background:#1313AE;border-radius:4px;"></div><div title="blue-12" style="height:28px;background:#0A0A47;border-radius:4px;"></div>
      </div>
    </div><div style="display:flex;align-items:center;gap:10px;">

      <div style="flex:1;display:grid;grid-template-columns:repeat(12,1fr);gap:2px;">

      </div>
    </div><div style="display:flex;align-items:center;gap:10px;">
      <div style="width:60px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);">red</div>
      <div style="flex:1;display:grid;grid-template-columns:repeat(12,1fr);gap:2px;">
        <div title="red-1" style="height:28px;background:#FDF9FA;border-radius:4px;"></div><div title="red-2" style="height:28px;background:#FBECEF;border-radius:4px;"></div><div title="red-3" style="height:28px;background:#F9D7DD;border-radius:4px;"></div><div title="red-4" style="height:28px;background:#F8BEC9;border-radius:4px;"></div><div title="red-5" style="height:28px;background:#F7A1B0;border-radius:4px;"></div><div title="red-6" style="height:28px;background:#F67E93;border-radius:4px;"></div><div title="red-7" style="height:28px;background:#F65B76;border-radius:4px;"></div><div title="red-8" style="height:28px;background:#F53D5E;border-radius:4px;"></div><div title="red-9" style="height:28px;background:#F5133B;border-radius:4px;"></div><div title="red-10" style="height:28px;background:#D31234;border-radius:4px;"></div><div title="red-11" style="height:28px;background:#A81A33;border-radius:4px;"></div><div title="red-12" style="height:28px;background:#450D17;border-radius:4px;"></div>
      </div>
    </div>
</div>
</div></body></html>
