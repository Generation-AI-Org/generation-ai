<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);}
.card{padding:24px 28px;box-sizing:border-box;width:100%;}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px;}
.row{display:grid;grid-template-columns:56px 1fr;gap:16px;align-items:baseline;padding:10px 0;border-top:1px solid var(--border);}
.row:first-of-type{border-top:none;}
.label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;color:var(--text-muted);text-transform:uppercase;}
h1,h2,h3,h4,h5,h6{margin:0;}
</style></head><body><div class="card">
<div class="meta">// heading hierarchy — h1 → h6</div>
<div class="row"><span class="label">H1</span><h1>Die KI-Community</h1></div>
<div class="row"><span class="label">H2</span><h2>Was wir bieten</h2></div>
<div class="row"><span class="label">H3</span><h3>KI-Tool-Bibliothek</h3></div>
<div class="row"><span class="label">H4</span><h4>Für welche Use-Cases passt ChatGPT?</h4></div>
<div class="row"><span class="label">H5</span><h5>// Section · 02 — Features</h5></div>
<div class="row"><span class="label">H6</span><h6>Meta · Letzte Änderung · 21.04.26</h6></div>
</div></body></html>
