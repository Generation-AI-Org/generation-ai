<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}
.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
</style></head><body><div class="card">
<div class="meta">// motion · durations + easings</div>
<div style="margin-top:10px;display:flex;flex-direction:column;gap:10px;">
  <div style="display:flex;gap:24px;font-family:var(--font-mono);font-size:12px;">
    <div><span style="color:var(--text-muted);">fast</span> <span style="color:#CEFF32;">150ms</span></div>
    <div><span style="color:var(--text-muted);">normal</span> <span style="color:#CEFF32;">300ms</span></div>
    <div><span style="color:var(--text-muted);">slow</span> <span style="color:#CEFF32;">500ms</span></div>
  </div>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);line-height:1.8;">
    <div>ease-out &nbsp;&nbsp;<span style="color:var(--text-muted);">cubic-bezier(0.16, 1, 0.3, 1)</span></div>
    <div>ease-in-out <span style="color:var(--text-muted);">cubic-bezier(0.65, 0, 0.35, 1)</span></div>
  </div>
  <div style="font-family:var(--font-sans);font-size:12px;color:var(--text-muted);margin-top:4px;">Feel: smooth, zweckmäßig, mit Wow-Momenten. Nie hektisch.</div>
</div>
</div></body></html>
