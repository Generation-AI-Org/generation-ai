<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}
.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
</style></head><body><div class="card">
<div class="meta">// surfaces · dark + light side by side</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px;">
  
    <div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;">Dark</div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <div style="display:flex;align-items:center;gap:10px;height:36px;padding:0 12px;background:#141414;border:1px solid rgba(128,128,128,.15);border-radius:8px;color:#fff;">
          <div style="font-family:var(--font-mono);font-size:11px;font-weight:700;flex:1;">bg</div>
          <div style="font-family:var(--font-mono);font-size:10px;opacity:.6;">#141414</div>
        </div><div style="display:flex;align-items:center;gap:10px;height:36px;padding:0 12px;background:#1C1C1C;border:1px solid rgba(128,128,128,.15);border-radius:8px;color:#fff;">
          <div style="font-family:var(--font-mono);font-size:11px;font-weight:700;flex:1;">bg-card</div>
          <div style="font-family:var(--font-mono);font-size:10px;opacity:.6;">#1C1C1C</div>
        </div><div style="display:flex;align-items:center;gap:10px;height:36px;padding:0 12px;background:#222222;border:1px solid rgba(128,128,128,.15);border-radius:8px;color:#fff;">
          <div style="font-family:var(--font-mono);font-size:11px;font-weight:700;flex:1;">bg-elevated</div>
          <div style="font-family:var(--font-mono);font-size:10px;opacity:.6;">#222222</div>
        </div><div style="display:flex;align-items:center;gap:10px;height:36px;padding:0 12px;background:#3A3AFF;border:1px solid rgba(128,128,128,.15);border-radius:8px;color:#fff;">
          <div style="font-family:var(--font-mono);font-size:11px;font-weight:700;flex:1;">bg-header</div>
          <div style="font-family:var(--font-mono);font-size:10px;opacity:.6;">#3A3AFF</div>
        </div>
      </div>
    </div>
    <div>
      <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;">Light</div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        <div style="display:flex;align-items:center;gap:10px;height:36px;padding:0 12px;background:#F6F6F6;border:1px solid rgba(128,128,128,.15);border-radius:8px;color:#141414;">
          <div style="font-family:var(--font-mono);font-size:11px;font-weight:700;flex:1;">bg</div>
          <div style="font-family:var(--font-mono);font-size:10px;opacity:.6;">#F6F6F6</div>
        </div><div style="display:flex;align-items:center;gap:10px;height:36px;padding:0 12px;background:#FFFFFF;border:1px solid rgba(128,128,128,.15);border-radius:8px;color:#141414;">
          <div style="font-family:var(--font-mono);font-size:11px;font-weight:700;flex:1;">bg-card</div>
          <div style="font-family:var(--font-mono);font-size:10px;opacity:.6;">#FFFFFF</div>
        </div><div style="display:flex;align-items:center;gap:10px;height:36px;padding:0 12px;background:#EFEFEF;border:1px solid rgba(128,128,128,.15);border-radius:8px;color:#141414;">
          <div style="font-family:var(--font-mono);font-size:11px;font-weight:700;flex:1;">bg-elevated</div>
          <div style="font-family:var(--font-mono);font-size:10px;opacity:.6;">#EFEFEF</div>
        </div><div style="display:flex;align-items:center;gap:10px;height:36px;padding:0 12px;background:#FC78FE;border:1px solid rgba(128,128,128,.15);border-radius:8px;color:#141414;">
          <div style="font-family:var(--font-mono);font-size:11px;font-weight:700;flex:1;">bg-header</div>
          <div style="font-family:var(--font-mono);font-size:10px;opacity:.6;">#FC78FE</div>
        </div>
      </div>
    </div>
</div>
</div></body></html>
