<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../colors_and_type.css"><style>
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}
.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}
.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}
</style></head><body><div class="card">
<div class="meta">// spacing · base 4px · 4 8 12 16 24 32 48 64 96</div>
<div style="display:flex;flex-direction:column;gap:6px;margin-top:8px;">
  
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:36px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--text-muted);">1</div>
      <div style="width:4px;height:12px;background:#CEFF32;border-radius:3px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">4px</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:36px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--text-muted);">2</div>

    </div>

      <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">12px</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:36px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--text-muted);">4</div>
      <div style="width:16px;height:12px;background:#CEFF32;border-radius:3px;"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">16px</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:36px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--text-muted);">6</div>

    </div>

      <div style="width:36px;font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--text-muted);">24</div>

      <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">96px</div>
    </div>
