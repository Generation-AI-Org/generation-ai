<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;}.card{padding:24px;box-sizing:border-box;width:100%;min-height:100vh;}.meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:12px;}</style></head><body><div class="card">
<div class="meta">// inputs · rounded-2xl · border · focus=accent</div>
<div style="display:flex;flex-direction:column;gap:14px;margin-top:10px;max-width:520px;">
  <div>
    <label style="font-family:var(--font-sans);font-size:14px;font-weight:500;color:#F6F6F6;display:block;margin-bottom:8px;">Name *</label>
    <input value="Dein Name" style="width:100%;box-sizing:border-box;font-family:var(--font-sans);font-size:16px;padding:12px 16px;border-radius:16px;background:#1C1C1C;border:1px solid rgba(255,255,255,.08);color:#F6F6F6;outline:none;">
  </div>
  <div>
    <label style="font-family:var(--font-sans);font-size:14px;font-weight:500;color:#F6F6F6;display:block;margin-bottom:8px;">Email *</label>
    <input value="du@uni.de" style="width:100%;box-sizing:border-box;font-family:var(--font-sans);font-size:16px;padding:12px 16px;border-radius:16px;background:#1C1C1C;border:1px solid #CEFF32;color:#F6F6F6;outline:none;box-shadow:0 0 0 3px rgba(206,255,50,.15);">
    <div style="font-family:var(--font-sans);font-size:13px;color:#8A8A8A;margin-top:6px;">focus · border accent</div>
  </div>
</div>
</div></body></html>
